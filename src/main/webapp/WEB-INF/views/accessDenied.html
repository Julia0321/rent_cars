<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access denied</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 720px;">
    <div class="alert alert-danger">
        <h4 class="alert-heading" th:text="#{access.denied.title}">Access denied</h4>
        <p th:text="#{access.denied.text}">You don’t have permission to view this page</p>
        <hr>
        <a class="btn btn-primary" th:href="@{/user/dashboard}" th:text="#{access.denied.back}">Back to dashboard</a>
    </div>
</div>
</body>
</html>
