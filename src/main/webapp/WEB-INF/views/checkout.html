<!doctype html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout – wynajem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light"
      th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">

<div class="container py-4">

    <h1 class="h4 mb-4" th:text="#{label.summary}">Summary and payment</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
    <div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>
    <div th:if="${param.expired}" class="alert alert-danger" th:text="#{label.time.expired}">
        Limit czasu na płatność minął. Zarezerwuj jeszcze raz.
    </div>

    <div class="row g-4">

        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold" th:text="#{label.your.order}">Your order</div>
                <div class="card-body">

                    <h5 class="card-title mb-1"
                        th:text="${car.brand} + ' ' + ${car.model}">
                        Brand Model
                    </h5>

                    <div class="text-muted small mb-3">
                        <span th:text="#{label.price.pe}">Price per day: </span>
                        <span th:text="${car.pricePerDay} + ' PLN'"></span>
                    </div>

                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item d-flex justify-content-between">
                            <span th:text="#{label.rental}">Rental period</span>
                            <span>
                                <strong th:text="${from}"></strong>
                                <span class="mx-2">→</span>
                                <strong th:text="${to}"></strong>
                            </span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span th:text="#{label.num}">Number of days</span>
                            <strong th:text="${days}"></strong>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span th:text="#{label.sum}">Sum</span>
                            <strong th:text="${total} + ' PLN'"></strong>
                        </li>
                    </ul>

                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold" th:text="#{label.details}">Payment</div>
                <div class="card-body">

                    <form method="post"
                          th:action="@{/rent/pay}"
                          th:object="${pay}">

                        <input type="hidden" th:field="*{reservationUUID}" />

                        <div class="row g-3">
                            <div class="col-12 form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms" th:text="#{label.accept.rental}">
                                    I accept the rental regulations.
                                </label>
                            </div>
                        </div>

                        <hr class="my-3">

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="fw-semibold" th:text="#{label.to.paid}">To be paid:</span>
                            <span class="fs-5 fw-bold"
                                  th:text="${total} + ' PLN'"></span>
                        </div>

                        <button class="btn btn-warning w-100 fw-bold" type="submit" th:text="#{label.pay}">
                            Pay
                        </button>
                    </form>

                </div>
            </div>
        </div>

    </div>
    <div class="d-flex justify-content-center mt-4">
        <a class="btn btn-outline-light" th:href="@{/user/dashboard}" th:text="#{label.back.to.user.panel}">
            ← Back to user panel
        </a>
    </div>
</div>
</body>
</html>
