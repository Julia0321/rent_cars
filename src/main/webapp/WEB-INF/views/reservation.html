<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        h1 { font-size: 48px; color: white; }
    </style>
</head>

<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">
<h1 class="text-center" th:text="#{label.reservation}">Reservation</h1>

<div class="container py-4">
    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
    <div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

    <form th:action="@{/rent/book/car}" method="post" th:object="${search}"
          class="row row-cols-lg-auto g-2 align-items-end mb-4">

        <div class="col-12" th:if="${#fields.hasGlobalErrors()}">
            <div class="alert alert-warning py-2 mb-0" th:each="e : ${#fields.globalErrors()}" th:text="${e}">
                Date order error
            </div>
        </div>

        <div class="col-12">
            <label for="reservation-from" class="form-label mb-0 small" th:text="#{label.start}">Start date</label>
            <input type="date" class="form-control" th:field="*{from}" id="reservation-from">
            <div th:errors="*{from}" class="text-warning small mt-1" style="min-height: 18px;"></div>
        </div>

        <div class="col-12">
            <label for="reservation-to" class="form-label mb-0 small" th:text="#{label.end}">End date</label>
            <input type="date" class="form-control" th:field="*{to}" id="reservation-to">
            <div th:errors="*{to}" class="text-warning small mt-1" style="min-height: 18px;"></div>
        </div>

        <div class="col-12 d-flex align-items-end h-100">
            <button type="submit" class="btn btn-primary" th:text="#{label.submit}">Submit</button>
        </div>
    </form>

    <div id="results" th:if="${cars != null}">
        <div th:if="${#lists.isEmpty(cars)}" class="alert alert-warning" th:text="#{label.no.available.on}">
            NO AVAILABLE CARS ON THIS DATE
        </div>

        <div th:if="${!#lists.isEmpty(cars)}" class="card shadow-sm">
            <div class="card-body">
                <h2 class="h5 mb-3 fw-bold" th:text="#{label.available}">Available cars</h2>

                <div class="table-responsive">
                    <table class="table table-striped table-hover table-bordered align-middle text-center mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width:30%;" th:text="#{label.brand}">Brand</th>
                            <th style="width:30%;" th:text="#{label.model}">Model</th>
                            <th style="width:25%;" th:text="#{label.price}">Price per day</th>
                            <th style="width:15%;" th:text="#{label.action}">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="car : ${cars}">
                            <td th:text="${car.brand}">Brand</td>
                            <td th:text="${car.model}">Model</td>
                            <td th:text="${car.pricePerDay}">Price per day</td>
                            <td>
                                <a class="btn btn-warning btn-sm"
                                   th:href="@{/rent/car(
                                        carUUID=${car.uuid},
                                        from=${#temporals.format(search.from,'yyyy-MM-dd')},
                                        to=${#temporals.format(search.to,'yyyy-MM-dd')}
                                   )}" th:text="#{label.details.butt}">
                                    Details
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
    <div class="d-flex justify-content-center mt-4">
        <a class="btn btn-outline-light" th:href="@{/user/dashboard}" th:text="#{label.back.to.user.panel}">
            ← Back to user panel
        </a>
    </div>
</div>

</body>
</html>
