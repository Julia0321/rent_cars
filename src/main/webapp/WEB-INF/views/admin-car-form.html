<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add car</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">

<div class="container py-4">

    <h1 class="text-center mb-4 text-white" th:text="#{label.add.car}">Add new car</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
    <div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

    <div class="card glass shadow-sm">
        <div class="card-body">

            <form th:action="@{/admin/cars/new}" th:object="${car}" method="post">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.brand}">Brand</label>
                        <input type="text" class="form-control" th:field="*{brand}">
                        <div class="text-danger small" th:errors="*{brand}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.model}">Model</label>
                        <input type="text" class="form-control" th:field="*{model}">
                        <div class="text-danger small" th:errors="*{model}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.fuel}">Fuel</label>
                        <select class="form-select" th:field="*{fuel}">
                            <option th:each="f : ${fuels}" th:value="${f}" th:text="${f}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.transmission}">Transmission</label>
                        <select class="form-select" th:field="*{transmission}">
                            <option th:each="t : ${transmissions}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.production}">Production number</label>
                        <input type="text" class="form-control" th:field="*{productionNumber}">
                        <div class="text-danger small" th:errors="*{productionNumber}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.registrationNumber}">Registration number</label>
                        <input type="text" class="form-control" th:field="*{registrationNumber}">
                        <div class="text-danger small" th:errors="*{registrationNumber}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.price.per.day}">Price per day</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{pricePerDay}">
                        <div class="text-danger small" th:errors="*{pricePerDay}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" th:text="#{label.status}">Status</label>
                        <select class="form-select" th:field="*{carStatus}">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                    </div>

                </div>

                <button th:text="#{label.button.add}" class="btn btn-primary w-100 mt-4">
                    Add car
                </button>

            </form>

        </div>
    </div>
    <div class="d-flex justify-content-center mt-4">
        <a th:text="#{label.back.to.cars}" class="btn btn-outline-light" th:href="@{/admin/cars}">
            ← Back to cars panel
        </a>
    </div>
</div>
</body>
</html>
