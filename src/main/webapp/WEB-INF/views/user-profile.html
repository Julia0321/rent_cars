<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">

<div class="container py-4" style="max-width: 720px;">
    <h1 class="text-center text-white mb-4" th:text="#{label.profile}">My profile</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
    <div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

    <div class="card shadow-sm" style="background: rgba(255,255,255,.92); border-radius: 18px;">
        <div class="card-body">

            <form th:action="@{/user/edit}" th:object="${editUser}" method="post">

                <div class="mb-3">
                    <label class="form-label" th:text="#{label.firstname}">Firstname</label>
                    <input class="form-control" th:field="*{firstname}">
                    <div class="text-danger small" th:errors="*{firstname}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{label.surname}">Surname</label>
                    <input class="form-control" th:field="*{surname}">
                    <div class="text-danger small" th:errors="*{surname}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{label.phoneNumber}">Phone number</label>
                    <input class="form-control" th:field="*{phoneNumber}">
                    <div class="text-danger small" th:errors="*{phoneNumber}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{label.password}">Password</label>
                    <input type="password" class="form-control" th:field="*{password}">
                    <div class="text-danger small" th:errors="*{password}"></div>
                </div>

                <button class="btn btn-primary" type="submit" th:text="#{label.save}">Save</button>

            </form>

        </div>
    </div>
    <div class="d-flex justify-content-center mt-4">
        <a class="btn btn-outline-light" th:href="@{/user/dashboard}" th:text="#{label.back.to.user.panel}">
            ← Back to user panel
        </a>
    </div>
</div>

</body>
</html>
