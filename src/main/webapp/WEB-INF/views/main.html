<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        h1 {
            font-size: 48px;
            color: white;
        }
        .bold{
            font-weight: bolder;
        }
    </style>
</head>

<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">

<div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-lg bg-light text-dark">
                <div class="card-body">

                    <h2 class="text-center mb-4 fw-bold" th:text="#{label.available}">Available cars</h2>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover table-bordered align-middle text-center w-100 mb-0"
                               style="table-layout: fixed; word-wrap: break-word;">
                            <thead class="table-light">
                            <tr class="text-center">
                                <th style="width:30%;" th:text="#{label.brand}">Brand</th>
                                <th style="width:30%;" th:text="#{label.model}">Model</th>
                                <th style="width:25%;" th:text="#{label.price}">Price per day</th>
                                <th style="width:15%;" th:text="#{label.action}">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="car : ${cars}">
                                <td th:text="${car.brand}">Brand</td>
                                <td th:text="${car.model}">Model</td>
                                <td th:text="${car.pricePerDay}">Price per day</td>
                                <td>
                                    <a th:href="@{/rent/car(carUUID=${car.uuid})}" class="bold btn btn-warning btn-sm w-100">Details</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(cars)}">
                                <td colspan="4" class="text-muted py-3" th:text="#{label.noAvailable}">No cars to display</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <div class="d-flex justify-content-center mt-4">
        <a class="btn btn-outline-light" th:href="@{/user/dashboard}">
            ← Back to user panel
        </a>
    </div>
</div>
</body>
</html>
