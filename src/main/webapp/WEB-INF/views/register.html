<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        label {
            color: white;
            font-weight: bolder;
        }
        h1 {
            font-size: 48px;
            color: white;
        }
    </style>
</head>
<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'" class="container py-5">

<h1 th:text="#{label.registration}">Registration</h1>
<br>
<div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
<div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

<form method="post" th:action="@{/users/save}" th:object="${user}" class="col-md-5" novalidate>

    <input type="hidden" th:field="*{uuid}" />

    <div class="row g-3">
        <div class="row mb-3">
            <div class="col-12 col-md-6">
                <label for="email" th:text="#{label.email}">E-mail</label>
                <input type="email" th:field="*{email}" class="form-control" id="email" th:placeholder="#{label.email}">
                <div th:errors="*{email}" class="text-warning"></div>
            </div>
            <div class="col-12 col-md-6">
                <label for="password" th:text="#{label.password}">Password</label>
                <input type="password" th:field="*{password}" class="form-control" id="password" th:placeholder="#{label.password}">
                <div th:errors="*{password}" class="text-warning"></div>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-12 col-md-6">
                <label for="firstname" th:text="#{label.firstname}">Firstname</label>
                <input type="text" th:field="*{firstname}" class="form-control" id="firstname" th:placeholder="#{label.firstname}">
                <div th:errors="*{firstname}" class="text-warning"></div>
            </div>
            <div class="col-12 col-md-6">
                <label for="surname" th:text="#{label.surname}">Surname</label>
                <input type="text" th:field="*{surname}" class="form-control" id="surname" th:placeholder="#{label.surname}">
                <div th:errors="*{surname}" class="text-warning"></div>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-12 col-md-6">
                <label for="phoneNumber" th:text="#{label.phoneNumber}">Phone</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" th:placeholder="#{label.phoneNumber}">
                <div th:errors="*{phoneNumber}" class="text-warning"></div>
            </div>
            <div class="col-12 col-md-6">
                <label for="dateOfBirth" th:text="#{label.birthday}">Birthday</label>
                <input type="date" th:field="*{dateOfBirth}" class="form-control" id="dateOfBirth" th:placeholder="#{label.birthday}">
                <div th:errors="*{dateOfBirth}" class="text-warning"></div>
            </div>
        </div>
        <div class="g-recaptcha mb-3" th:attr="data-sitekey=${siteKey}"></div>
        <div th:if="${captchaError}" class="text-danger fw-bold" th:text="#{${captchaError}}"></div>
        <div class="col-12">
            <button type="submit" class="btn btn-sm fw-bold btn-warning"
                    th:text="#{label.register}">Register</button>
        </div>
    </div>
</form>
</body>
</html>
