<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My reservations</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        h1 { font-size: 44px; color: white; }
        .glass { background: rgba(255,255,255,.90); border-radius: 18px; }
    </style>
</head>

<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">

<div class="container py-4">
    <h1 class="text-center mb-4" th:text="#{label.my.reservations}">My reservations</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
    <div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

    <div class="card glass shadow-sm">
        <div class="card-body">

            <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-warning mb-0" th:text="#{label.no.res}">
                You have no reservations yet.
            </div>

            <div th:if="${!#lists.isEmpty(reservations)}" class="table-responsive">
                <table class="table table-striped table-hover align-middle text-center mb-0">
                    <thead class="table-light">
                    <tr>
                        <th th:text="#{label.dates}">Dates</th>
                        <th th:text="#{label.car}">Car</th>
                        <th th:text="#{label.status}">Status</th>
                        <th th:text="#{label.total}">Total</th>
                        <th th:text="#{label.pdf.head}">PDF</th>
                        <th th:text="#{label.action}">Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="r : ${reservations}">

                        <td>
                            <span th:text="${#temporals.format(r.from,'yyyy-MM-dd')}"></span>
                            -
                            <span th:text="${#temporals.format(r.to,'yyyy-MM-dd')}"></span>
                        </td>

                        <td th:text="${r.carBrand + ' ' + r.carModel}">Brand Model</td>

                        <td th:text="${r.status}">STATUS</td>

                        <td th:text="${r.totalPrice + ' PLN'}">0 PLN</td>

                        <td>
                            <a class="btn btn-sm btn-warning"
                               th:if="${r.paymentUuid != null}"
                               th:href="@{'/generatePdf-' + ${r.paymentUuid}}" th:text="#{label.download.pdf}">
                                Download PDF
                            </a>

                            <span class="text-muted small" th:if="${r.paymentUuid == null}">
                                -
                            </span>
                        </td>

                        <td>
                            <form th:if="${r.status.name() == 'PENDING' or r.status.name() == 'ACCEPTED'}"
                                  th:action="@{/user/reservation/cancel/{uuid}(uuid=${r.reservationUuid})}"
                                  method="post"
                                  th:onsubmit="|return confirm('#{label.cancel}');|">

                                <button type="submit" class="btn btn-sm btn-danger" th:text="#{label.cancel.submit}">
                                    Cancel
                                </button>
                            </form>

                            <span class="text-muted small"
                                  th:unless="${r.status.name() == 'PENDING' or r.status.name() == 'ACCEPTED'}">
                                -
                            </span>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
    <div class="d-flex justify-content-center mt-4">
        <a class="btn btn-outline-light" th:href="@{/user/dashboard}" th:text="#{label.back.to.user.panel}">
            ← Back to user panel
        </a>
    </div>
</div>

</body>
</html>
