<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        h1 { font-size: 48px; color: white; }
        .bold { font-weight: bolder; }
    </style>
</head>

<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">
<div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
<div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

<div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-lg bg-light text-dark">
                <div class="card-body">

                    <h2 class="text-center mb-4 fw-bold" th:text="#{label.car}">Car</h2>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover table-bordered align-middle text-center w-100 mb-0"
                               style="table-layout: fixed; word-wrap: break-word;">
                            <thead class="table-light">
                            <tr>
                                <th th:text="#{label.brand}">Brand</th>
                                <th th:text="#{label.model}">Model</th>
                                <th th:text="#{label.price}">Price per day</th>
                                <th th:text="#{label.fuel}">Fuel</th>
                                <th th:text="#{label.transmission}">Transmission</th>
                                <th th:text="#{label.registrationNumber}">Registration Number</th>
                                <th th:text="#{label.action}">Action</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr>
                                <td th:text="${car.brand}">Brand</td>
                                <td th:text="${car.model}">Model</td>
                                <td th:text="${car.pricePerDay}">Price per day</td>
                                <td th:text="${car.fuel}">Fuel</td>
                                <td th:text="${car.transmission}">Transmission</td>
                                <td th:text="${car.registrationNumber}">Registration Number</td>
                                <td>
                                    <a class="btn btn-warning btn-sm w-100"
                                       th:href="@{/rent/checkout(
                                            carUUID=${car.uuid},
                                            from=${#temporals.format(from,'yyyy-MM-dd')},
                                            to=${#temporals.format(to,'yyyy-MM-dd')}
                                       )}" th:text="#{label.rent}">
                                        Rent
                                    </a>
                                </td>
                            </tr>
                            </tbody>

                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
<div class="d-flex justify-content-center mt-4">
    <a class="btn btn-outline-light" th:href="@{/user/dashboard}" th:text="#{label.back.to.user.panel}">
        ← Back to user panel
    </a>
</div>

</body>
</html>
