<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Reservations</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        h1 { font-size: 44px; color: white; }
        .tile {
            transition: transform .12s ease, box-shadow .12s ease;
            border-radius: 16px;
        }
        .tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15);
        }
        .glass {
            background: rgba(255,255,255,.88);
            border-radius: 18px;
        }
    </style>
</head>

<body th:style="'background: url(' + @{/resources/images/tlo.png} + ') center/cover no-repeat fixed;'">

<div class="container py-4">

    <h1 class="text-center mb-4" th:text="#{label.reservations}">Reservations</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>
    <div th:if="${msg}" class="alert alert-success" th:text="#{${msg}}"></div>

    <div class="card glass shadow-sm">
        <div class="card-body">

            <div th:if="${#lists.isEmpty(allReservations)}" class="alert alert-warning mb-0" th:text="#{label.no.reservations}">
                No reservations.
            </div>

            <div th:if="${!#lists.isEmpty(allReservations)}" class="table-responsive">
                <table class="table table-striped table-hover align-middle text-center mb-0">
                    <thead class="table-light">
                    <tr>
                        <th th:text="#{label.user}">User</th>
                        <th th:text="#{label.dates}">Dates</th>
                        <th th:text="#{label.car}">Car</th>
                        <th th:text="#{label.status}">Status</th>
                        <th th:text="#{label.total}">Total</th>
                        <th th:text="#{label.payment}">Payment</th>
                        <th th:text="#{label.actions}">Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="r : ${allReservations}">
                        <td>
                            <span th:text="${r.email}"></span>
                        </td>
                        <td>
                            <span th:text="${#temporals.format(r.from,'yyyy-MM-dd')}"></span>
                            -
                            <span th:text="${#temporals.format(r.to,'yyyy-MM-dd')}"></span>
                        </td>

                        <td th:text="${r.carBrand + ' ' + r.carModel}">Brand Model</td>

                        <td>
                            <span class="badge bg-secondary" th:text="${r.reservationStatus}">STATUS</span>
                        </td>

                        <td th:text="${r.totalPrice + ' PLN'}">0 PLN</td>

                        <td>
                            <span th:if="${r.paymentUuid != null}"
                                  class="badge bg-success"
                                  th:text="${r.paymentStatus}">
                            </span>
                            <span th:if="${r.paymentUuid == null}" class="text-muted small">-</span>
                        </td>

                        <td class="text-nowrap">

                            <form class="d-inline"
                                  th:if="${r.reservationStatus.name() == 'PENDING' || r.reservationStatus.name() == 'REJECTED'}"
                                  th:action="@{/admin/reservations/{uuid}/accept(uuid=${r.reservationUuid})}"
                                  method="post"
                                  th:onsubmit="|return confirm('#{reservation.accept.confirm}');|">
                                <button type="submit" class="btn btn-sm btn-success" th:text="#{label.accept}">
                                    Accept
                                </button>
                            </form>

                            <form class="d-inline"
                                  th:if="${r.reservationStatus.name() == 'PENDING' || r.reservationStatus.name() == 'ACCEPTED'}"
                                  th:action="@{/admin/reservations/{uuid}/reject(uuid=${r.reservationUuid})}"
                                  method="post"
                                  th:onsubmit="|return confirm('#{reservation.reject.confirm}');|">
                                <button type="submit" class="btn btn-sm btn-danger" th:text="#{label.reject}">
                                    Reject
                                </button>
                            </form>

                            <span class="text-muted small"
                                  th:if="${r.reservationStatus.name() == 'CANCELLED'}">
                                -
                            </span>

                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <div class="d-flex justify-content-center mt-4">
        <a class="btn btn-outline-light" th:href="@{/admin}" th:text="#{label.back.admin}">
            ← Back to admin panel
        </a>
    </div>

</div>

</body>
</html>
